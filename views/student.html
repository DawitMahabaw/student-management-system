<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <nav class="app-navbar">
    <div class="brand">Student Management System</div>
    <div>
      <span class="role-badge">Student</span>
      <span id="userEmail" class="text-muted small me-3"></span>
      <button id="logoutBtn" class="btn btn-sm btn-outline-secondary">Logout</button>
    </div>
  </nav>

  <div class="dashboard-container">
    <div class="dashboard-card" style="max-width: 500px; margin: 0 auto;">
      <h5 class="mb-3">My Information</h5>
      <div id="infoContainer"></div>
    </div>
  </div>

  <script src="/js/student.js"></script>
</body>
</html>
